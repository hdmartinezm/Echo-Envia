name: ✅ Terraform Minimal Deploy (RECOMMENDED)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TERRAFORM_VERSION: '1.6.0'
  WORKING_DIRECTORY: './terraform/minimal'

jobs:
  terraform-minimal:
    name: Terraform Minimal Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Clean existing resources (if any)
        run: |
          echo "Checking for existing Resource Group..."
          if az group exists --name "rg-envia-dev" | grep -q "true"; then
            echo "Resource Group exists, deleting..."
            az group delete --name "rg-envia-dev" --yes --no-wait
            echo "Waiting for deletion to complete..."
            while az group exists --name "rg-envia-dev" | grep -q "true"; do
              echo "Still deleting..."
              sleep 10
            done
            echo "Resource Group deleted successfully"
          else
            echo "No existing Resource Group found"
          fi

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          terraform plan \
            -var-file="dev-simple.tfvars" \
            -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Output
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: terraform output -json